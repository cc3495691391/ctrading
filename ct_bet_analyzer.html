<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C神投注分析器 · 赔率+必发+亚盘</title>
</head>
<body>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f1f5f9;color:#1e293b;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC",sans-serif;padding:20px 12px 60px}
.ct{max-width:800px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:2px;flex-wrap:wrap}
.hdr h1{font-size:1.2rem;flex:1}
.hdr .tag{background:#dc2626;color:#fff;font-size:0.55rem;padding:3px 8px;border-radius:6px;font-weight:700;white-space:nowrap}
.sub{font-size:0.72rem;color:#64748b;margin-bottom:14px}
.card{background:#fff;border-radius:16px;padding:20px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:12px}
.card h2{font-size:0.82rem;padding-bottom:8px;border-bottom:1px solid #e2e8f0;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{font-size:0.7rem;color:#475569;display:block;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:10px 14px;border:1.5px solid #d1d5db;border-radius:10px;font-size:0.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fafafa}
.field input:focus,.field select:focus{border-color:#dc2626}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:0.95rem;font-family:inherit;font-weight:700;cursor:pointer;background:#dc2626;color:#fff;transition:all .15s}
.btn:hover{background:#b91c1c;transform:translateY(-1px)}
.detail-box{background:#f1f5f9;border-radius:10px;padding:12px;margin-bottom:12px;font-size:0.72rem;color:#475569;line-height:1.5}
.detail-box strong{color:#1e293b}
.detail-box .ex{color:#64748b;font-size:0.65rem;margin-top:4px}
.sc{text-align:center;padding:14px 0}
.sc .num{font-size:3rem;font-weight:900;line-height:1}
.sc .lbl{font-size:0.65rem;color:#64748b;margin-top:4px}
.sc .bdg{display:inline-block;padding:4px 16px;border-radius:20px;font-size:0.72rem;font-weight:700;margin-top:6px;color:#fff}
.gg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.gi{border-radius:10px;padding:12px 8px;text-align:center;background:#f8fafc}
.gi .gv{font-size:1.4rem;font-weight:900}
.gi .gl{font-size:0.6rem;color:#64748b;margin-top:2px}
.bw{background:#e2e8f0;border-radius:8px;height:20px;overflow:hidden;margin:8px 0}
.bf{height:100%;border-radius:8px;text-align:center;font-size:0.6rem;font-weight:700;color:#fff;line-height:20px}
.dr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:0.75rem;line-height:1.6}
.dr:last-child{border-bottom:none}
.dr .dl{color:#64748b}
.dr .dv{font-weight:600}
.wn{border-radius:10px;padding:10px 14px;font-size:0.75rem;margin:8px 0}
.ft{text-align:center;font-size:0.68rem;color:#94a3b8;padding-top:6px;line-height:1.5}
</style>

<div class="ct">

<div class="hdr">
<h1>⚽ C神投注分析器</h1>
<span class="tag">BJ时间 周日23:30/周一0:30</span>
</div>
<div class="sub">输入赔率+必发 → 基于142场英超+32场阿森纳历史校验统计</div>

<div class="card">
<h2>📋 输入参数</h2>
<div class="r2">
<div class="field">
<label>主队赔率 *</label>
<input id="oh" type="number" step="0.01" placeholder="如: 2.10" />
</div>
<div class="field">
<label>客队赔率 *</label>
<input id="oa" type="number" step="0.01" placeholder="如: 1.80" />
</div>
</div>

<div class="detail-box">
<strong>💡 预计净胜球</strong> — 仅用于判断亚盘结果 (上盘/走水/下盘)，不参与评分
<div class="r2" style="margin-top:8px">
<div class="field" style="margin-bottom:0">
<label>平局赔率（参考）</label>
<input id="od" type="number" step="0.01" placeholder="如: 3.50" />
</div>
<div class="field" style="margin-bottom:0">
<label>预计净胜球</label>
<select id="gd">
<option value="1">优势方赢1球</option>
<option value="2">优势方赢2球</option>
<option value="3">优势方赢3球+</option>
<option value="0">平局</option>
<option value="-1">优势方输球</option>
</select>
</div>
</div>
<div class="ex">例: 赔1.55+赢1球=走水 | 赔1.55+赢2球=上盘 | 赔1.55+平局=下盘</div>
</div>

<div class="r2">
<div class="field">
<label>必发成交量 (M)</label>
<input id="vol" type="number" step="0.1" placeholder="如: 12.5" />
</div>
<div class="field">
<label>必发优势方比例 (%)</label>
<input id="bfp" type="number" step="0.1" placeholder="如: 78" />
</div>
</div>

<button class="btn" id="go">🔍 开始分析</button>
</div>

<div class="card" id="rc" style="display:none">
<h2>📊 分析报告</h2>
<div id="out"></div>
</div>

<div class="ft">
统计基准: BJ时间周日23:30/周一00:30 英超 142场 (2022-23至2025-26)<br>
阿森纳验证: 32场 准确率基于阈值≤35回避/≥65推荐<br>
盘口规则: 基于赔率盘口知识体系·生成于2026-05-08 02:00 CST
</div>

</div>

<script>
var BG = { '上盘':'#16a34a', '走水':'#ca8a04', '下盘':'#dc2626', '赢半':'#2563eb' };

function ahResult(oh, oa, gd) {
  var fo = Math.min(oh, oa);
  var fw = oh < oa ? (gd > 0) : (gd < 0);
  var fgd = oh < oa ? gd : -gd;
  if (!fw) return '下盘';
  if (fo < 1.20) return fgd <= 2 ? '下盘' : '上盘';
  if (fo <= 1.29) return fgd === 1 ? '下盘' : (fgd === 2 ? '赢半' : '上盘');
  if (fo <= 1.47) return fgd === 1 ? '下盘' : '上盘';
  if (fo <= 1.60) return fgd === 1 ? '走水' : '上盘';
  return '上盘';
}

function brk(fo) {
  if (fo < 1.20) return '<1.20';
  if (fo <= 1.29) return '1.20-1.29';
  if (fo <= 1.47) return '1.30-1.47';
  if (fo <= 1.60) return '1.48-1.60';
  if (fo <= 1.90) return '1.61-1.90';
  if (fo <= 2.20) return '1.91-2.20';
  if (fo <= 3.00) return '2.21-3.00';
  return '>3.00';
}

// Per-bracket historical rates (ALL 142 EPL matches)
var BR = {
  'home_<1.20':0, 'home_1.20-1.29':20, 'home_1.30-1.47':44, 'home_1.48-1.60':20,
  'home_1.61-1.90':62, 'home_1.91-2.20':64, 'home_2.21-3.00':34,
  'away_1.20-1.29':0, 'away_1.30-1.47':66, 'away_1.48-1.60':57,
  'away_1.61-1.90':53, 'away_1.91-2.20':58, 'away_2.21-3.00':47,
};

document.getElementById('go').onclick = function() {
  var oh = parseFloat(document.getElementById('oh').value);
  var oa = parseFloat(document.getElementById('oa').value);
  var vol = parseFloat(document.getElementById('vol').value) || 0;
  var bf = parseFloat(document.getElementById('bfp').value) || 0;
  var gd = parseInt(document.getElementById('gd').value);

  if (!oh || !oa || isNaN(oh) || isNaN(oa)) {
    alert('请填写主队赔率和客队赔率');
    return;
  }

  var hf = oh < oa;
  var fo = Math.min(oh, oa);
  var fav = hf ? '主队' : '客队';
  var br = brk(fo);
  var ah = ahResult(oh, oa, gd);
  var key = (hf ? 'home_' : 'away_') + br;
  var base = BR[key] !== undefined ? BR[key] : 50;
  
  var ss = base;
  if (bf >= 85) ss -= 12;
  else if (bf >= 75) ss += 5;
  else if (bf >= 65) ss += 7;

  if (vol > 20) ss -= 12;
  else if (vol >= 15) ss += 3;
  else if (vol >= 10) ss += 5;
  else if (vol > 0 && vol < 5) ss -= 5;

  if (!hf && (br === '1.30-1.47' || br === '1.48-1.60')) ss += 8;
  if (hf && (br === '1.61-1.90' || br === '1.91-2.20')) ss += 8;
  if (hf && br === '1.48-1.60') ss -= 10;

  ss = Math.max(0, Math.min(100, ss));
  
  var recClass, recText;
  if (ss >= 65) { recClass = '上盘'; recText = '推荐'; }
  else if (ss <= 35) { recClass = '下盘'; recText = '回避'; }
  else { recClass = '走水'; recText = '谨慎'; }

  var el = document.getElementById('out');
  var H = '';

  H += '<div class="sc"><div class="num" style="color:' + BG[recClass] + '">' + ss + '</div>';
  H += '<div class="lbl">综合评分</div>';
  H += '<span class="bdg" style="background:' + BG[recClass] + '">' + recText + ' · 预计盘口: ' + ah + '</span></div>';

  var g1c = base >= 50 ? '#16a34a' : (base >= 30 ? '#ca8a04' : '#dc2626');
  H += '<div class="gg">';
  H += '<div class="gi"><div class="gv" style="color:' + g1c + '">' + base + '%</div><div class="gl">赔率区间上盘率</div></div>';
  H += '<div class="gi"><div class="gv" style="color:#16a34a">' + ss +'</div><div class="gl">修正后评分</div></div>';
  H += '<div class="gi"><div class="gv" style="color:#64748b">' + key.replace('_',' ').replace('home','主').replace('away','客') + '</div><div class="gl">历史区间</div></div>';
  H += '</div>';

  H += '<div class="bw"><div class="bf" style="width:' + ss + '%;background:' + BG[recClass] + '">' + ss + '/100</div></div>';

  H += '<div class="dr"><span class="dl">优势方</span><span class="dv">' + fav + ' (赔率 ' + fo.toFixed(2) + ')</span></div>';
  H += '<div class="dr"><span class="dl">预计盘口</span><span class="dv" style="color:' + BG[ah] + '">' + ah + '</span></div>';
  H += '<div class="dr"><span class="dl">必发比例</span><span class="dv">' + (bf > 0 ? bf + '%' : '未填') + '</span></div>';
  H += '<div class="dr"><span class="dl">成交量</span><span class="dv">' + (vol > 0 ? vol + 'M' : '未填') + '</span></div>';
  
  // Strategy
  H += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:0.82rem;line-height:1.7"><b>🎯 策略建议</b><br>';
  if (ss >= 65) {
    H += '✅ 可投注。';
    if (br === '1.48-1.60') H += '注意赢1球只走水。';
    if (!hf) H += '客场优势方更稳定。';
  } else if (ss > 35) {
    H += '⚠️ 谨慎。无足够历史数据支撑强烈倾向。';
  } else {
    H += '❌ 不建议投注。';
  }
  H += '</div>';

  // Accuracy note
  H += '<div style="margin-top:8px;padding:8px 10px;background:#f1f5f9;border-radius:8px;font-size:0.65rem;color:#64748b">';
  H += '📊 历史验证(32场阿森纳): 准确率50% — 本工具基于有限样本统计，仅供参考';
  H += '</div>';

  el.innerHTML = H;
  document.getElementById('rc').style.display = 'block';
  window.scrollTo({top: document.getElementById('rc').offsetTop - 20, behavior:'smooth'});
};
</script>
</body>
</html>
