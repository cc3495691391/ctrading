<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C神投注分析器 · 赔率+必发+亚盘</title>
</head>
<body>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f1f5f9;color:#1e293b;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang SC",sans-serif;padding:20px 12px 60px}
.ct{max-width:800px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.hdr h1{font-size:1.2rem;flex:1}
.hdr .tag{background:#dc2626;color:#fff;font-size:0.55rem;padding:3px 8px;border-radius:6px;font-weight:700;white-space:nowrap}
.sub{font-size:0.72rem;color:#64748b;margin-bottom:14px}
.card{background:#fff;border-radius:16px;padding:20px 16px;box-shadow:0 1px 6px rgba(0,0,0,0.07);margin-bottom:12px}
.card h2{font-size:0.82rem;padding-bottom:8px;border-bottom:1px solid #e2e8f0;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{font-size:0.7rem;color:#475569;display:block;margin-bottom:4px;font-weight:600}
.field input,.field select{width:100%;padding:10px 14px;border:1.5px solid #d1d5db;border-radius:10px;font-size:0.88rem;font-family:inherit;outline:none;transition:border-color .2s;background:#fafafa}
.field input:focus,.field select:focus{border-color:#dc2626}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:0.95rem;font-family:inherit;font-weight:700;cursor:pointer;background:#dc2626;color:#fff;transition:all .15s}
.btn:hover{background:#b91c1c;transform:translateY(-1px)}
.detail-box{background:#f1f5f9;border-radius:10px;padding:12px;margin-bottom:12px;font-size:0.72rem;color:#475569;line-height:1.5}
.detail-box strong{color:#1e293b}
.detail-box .ex{color:#64748b;font-size:0.65rem;margin-top:4px}
.sc{text-align:center;padding:14px 0}
.sc .num{font-size:3rem;font-weight:900;line-height:1}
.sc .lbl{font-size:0.65rem;color:#64748b;margin-top:4px}
.sc .bdg{display:inline-block;padding:4px 16px;border-radius:20px;font-size:0.72rem;font-weight:700;margin-top:6px;color:#fff}
.gg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.gi{border-radius:10px;padding:12px 8px;text-align:center;background:#f8fafc}
.gi .gv{font-size:1.4rem;font-weight:900}
.gi .gl{font-size:0.6rem;color:#64748b;margin-top:2px}
.bw{background:#e2e8f0;border-radius:8px;height:20px;overflow:hidden;margin:8px 0}
.bf{height:100%;border-radius:8px;text-align:center;font-size:0.6rem;font-weight:700;color:#fff;line-height:20px}
.dr{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:0.75rem;line-height:1.6}
.dr:last-child{border-bottom:none}
.dr .dl{color:#64748b}
.dr .dv{font-weight:600}
.wn{border-radius:10px;padding:10px 14px;font-size:0.75rem;margin:8px 0}
.ft{text-align:center;font-size:0.68rem;color:#94a3b8;padding-top:6px;line-height:1.5}
</style>

<div class="ct">

<div class="hdr">
<h1>⚽ C神投注分析器</h1>
<span class="tag">BJ时间 周日23:30/周一0:30</span>
</div>
<div class="sub">输入赔率+必发数据 → 基于142场英超历史统计 → 自动判断最佳策略</div>

<div class="card">
<h2>📋 输入参数</h2>
<div class="r2">
<div class="field">
<label>主队赔率 *</label>
<input id="oh" type="number" step="0.01" placeholder="如: 2.10" />
</div>
<div class="field">
<label>客队赔率 *</label>
<input id="oa" type="number" step="0.01" placeholder="如: 1.80" />
</div>
</div>

<div class="detail-box">
<strong>💡 预计净胜球</strong> —— 不参与评分，仅用于判断盘口结果（上盘/走水/下盘）
<div class="r2" style="margin-top:8px">
<div class="field" style="margin-bottom:0">
<label>平局赔率（参考）</label>
<input id="od" type="number" step="0.01" placeholder="如: 3.50" />
</div>
<div class="field" style="margin-bottom:0">
<label>预计净胜球</label>
<select id="gd">
<option value="1">优势方赢1球</option>
<option value="2">优势方赢2球</option>
<option value="3">优势方赢3球+</option>
<option value="0">平局</option>
<option value="-1">优势方输球</option>
</select>
</div>
</div>
<div class="ex">例: 赔1.55+赢1球=走水 | 赔1.55+赢2球=上盘 | 赔1.55+平局=下盘</div>
</div>

<div class="r2">
<div class="field">
<label>必发成交量 (M)</label>
<input id="vol" type="number" step="0.1" placeholder="如: 12.5" />
</div>
<div class="field">
<label>必发优势方比例 (%)</label>
<input id="bfp" type="number" step="0.1" placeholder="如: 78" />
</div>
</div>

<button class="btn" id="go">🔍 开始分析</button>
</div>

<div class="card" id="rc" style="display:none">
<h2>📊 分析报告</h2>
<div id="out"></div>
</div>

<div class="ft">
数据来源：五大联赛历史库（仅统计BJ时间周日23:30/周一00:30英超）<br>
2022-23至2025-26 · 共142场 · 盘口规则基于赔率盘口知识体系<br>
生成于 2026-05-08 02:00 CST · 由庄神生成
</div>

</div>

<script>
const BG = { '上盘':'#16a34a', '走水':'#ca8a04', '下盘':'#dc2626', '赢半':'#2563eb' };

function ahResult(oh, oa, gd) {
  var fo = Math.min(oh, oa);
  var fw = oh < oa ? (gd > 0) : (gd < 0);
  var fgd = oh < oa ? gd : -gd;
  if (!fw) return '下盘';
  if (fo < 1.20) return fgd <= 2 ? '下盘' : '上盘';
  if (fo <= 1.29) return fgd === 1 ? '下盘' : (fgd === 2 ? '赢半' : '上盘');
  if (fo <= 1.47) return fgd === 1 ? '下盘' : '上盘';
  if (fo <= 1.60) return fgd === 1 ? '走水' : '上盘';
  return '上盘';
}

function bracket(fo) {
  if (fo < 1.20) return '<1.20';
  if (fo <= 1.29) return '1.20-1.29';
  if (fo <= 1.47) return '1.30-1.47';
  if (fo <= 1.60) return '1.48-1.60';
  if (fo <= 1.90) return '1.61-1.90';
  if (fo <= 2.20) return '1.91-2.20';
  if (fo <= 3.00) return '2.21-3.00';
  return '>3.00';
}

function vlabel(v) {
  if (v <= 0) return '无数据';
  if (v < 5) return '<5M (小盘)';
  if (v < 10) return '5-10M (中盘)';
  if (v < 15) return '10-15M (活跃)';
  if (v < 20) return '15-20M (大盘)';
  return '>20M (超大盘)';
}

function blabel(p) {
  if (p <= 0) return '无数据';
  if (p < 50) return '<50% (冷门区)';
  if (p < 65) return '50-65% (均衡)';
  if (p < 75) return '65-75% (温和)';
  if (p < 85) return '75-85% (热门)';
  return '85%+ (极度热门)';
}

var HIST = {
  home: {
    '<1.20':   {t:2, u:0, p:0, h:0, d:2, r:0, bf:89.7, v:9.7},
    '1.20-1.29':{t:5, u:1, p:0, h:2, d:2, r:20, bf:87.9, v:11.3},
    '1.30-1.47':{t:9, u:4, p:0, h:0, d:5, r:44, bf:83.8, v:15.9},
    '1.48-1.60':{t:10,u:2, p:5, h:0, d:3, r:20, bf:80.7, v:12.2},
    '1.61-1.90':{t:16,u:10,p:0, h:0, d:6, r:62, bf:78.7, v:12.7},
    '1.91-2.20':{t:14,u:9, p:0, h:0, d:5, r:64, bf:69.6, v:12.1},
    '2.21-3.00':{t:23,u:8, p:0, h:0, d:15,r:34, bf:56.1, v:9.0},
  },
  away: {
    '1.20-1.29':{t:4, u:0, p:0, h:1, d:3, r:0, bf:89.4, v:12.6},
    '1.30-1.47':{t:6, u:4, p:0, h:0, d:2, r:66, bf:82.7, v:12.9},
    '1.48-1.60':{t:7, u:4, p:1, h:0, d:2, r:57, bf:80.9, v:12.6},
    '1.61-1.90':{t:13,u:7, p:0, h:0, d:6, r:53, bf:79.8, v:12.8},
    '1.91-2.20':{t:12,u:7, p:0, h:0, d:5, r:58, bf:72.5, v:12.9},
    '2.21-3.00':{t:21,u:10,p:0, h:0, d:11,r:47, bf:59.0, v:8.4},
  }
};

var VS = {
  '<5M':    {r:44, bf:63.2},
  '5-10M':  {r:44, bf:74.3},
  '10-15M': {r:55, bf:69.8},
  '15-20M': {r:52, bf:78.4},
  '>20M':   {r:20, bf:81.5},
};

var BS = {
  '<50%':   {r:40, v:4.4},
  '50-65%': {r:44, v:10.4},
  '65-75%': {r:51, v:10.9},
  '75-85%': {r:53, v:11.1},
  '85%+':   {r:25, v:18.6},
};

document.getElementById('go').onclick = function() {
  var oh = parseFloat(document.getElementById('oh').value);
  var oa = parseFloat(document.getElementById('oa').value);
  var vol = parseFloat(document.getElementById('vol').value) || 0;
  var bf = parseFloat(document.getElementById('bfp').value) || 0;
  var gd = parseInt(document.getElementById('gd').value);

  if (!oh || !oa || isNaN(oh) || isNaN(oa)) {
    alert('请填写主队赔率和客队赔率');
    return;
  }

  var hf = oh < oa;
  var fo = Math.min(oh, oa);
  var fav = hf ? '主队' : '客队';
  var br = bracket(fo);
  var ah = ahResult(oh, oa, gd);
  var db = hf ? HIST.home : HIST.away;
  var hi = db[br];
  var vl = vlabel(vol);
  var vs = VS[vl];
  var bl = blabel(bf);
  var bs = BS[bl];

  var el = document.getElementById('out');
  var H = '';
  var ss = 50;
  var sg = [];

  if (hi) {
    ss = hi.r;
    if (bf >= 85) { ss -= 15; sg.push('过热-15'); }
    else if (bf >= 75) { ss += 3; sg.push('偏好+3'); }
    else if (bf >= 65) { ss += 5; sg.push('适中+5'); }
    if (vol > 20) { ss -= 15; sg.push('天量-15'); }
    else if (vol >= 15) { ss += 2; sg.push('大盘+2'); }
    else if (vol >= 10) { ss += 3; sg.push('活跃+3'); }
    else if (vol > 0 && vol < 5) { ss -= 5; sg.push('稀疏-5'); }
    if (!hf && br === '1.30-1.47') { ss += 8; sg.push('客场深让+8'); }
    if (hf && (br === '1.61-1.90' || br === '1.91-2.20')) { ss += 5; sg.push('主场中赔+5'); }
    if (hf && br === '1.48-1.60') { ss -= 10; sg.push('主场陷阱-10'); }
  }
  if (br === '1.48-1.60' && gd === 1) { ss -= 10; sg.push('走水风险-10'); }

  ss = Math.max(0, Math.min(100, ss));
  var rc = ss >= 65 ? '上盘' : (ss >= 40 ? '走水' : '下盘');
  var rt = ss >= 65 ? '推荐' : (ss >= 40 ? '谨慎' : '回避');

  // Score display
  H += '<div class="sc"><div class="num" style="color:' + BG[rc] + '">' + ss + '</div>';
  H += '<div class="lbl">综合评分</div>';
  H += '<span class="bdg" style="background:' + BG[rc] + '">' + rt + ' · 预计盘口: ' + ah + '</span></div>';

  // Three indicators
  var ur = hi ? hi.r : 0;
  var g1c = ur >= 55 ? '#16a34a' : (ur >= 35 ? '#ca8a04' : '#dc2626');
  H += '<div class="gg">';
  H += '<div class="gi"><div class="gv" style="color:' + g1c + '">' + ur + '%</div><div class="gl">赔率区间上盘率</div></div>';
  var g2c = bs ? (bs.r >= 45 ? '#16a34a' : '#dc2626') : '#94a3b8';
  H += '<div class="gi"><div class="gv" style="color:' + g2c + '">' + (bs ? bs.r + '%' : '?') + '</div><div class="gl">必发区间上盘率</div></div>';
  var g3c = vs ? (vs.r >= 45 ? '#16a34a' : '#dc2626') : '#94a3b8';
  H += '<div class="gi"><div class="gv" style="color:' + g3c + '">' + (vs ? vs.r + '%' : '?') + '</div><div class="gl">成交量上盘率</div></div>';
  H += '</div>';

  // Bar
  H += '<div class="bw"><div class="bf" style="width:' + ss + '%;background:' + BG[rc] + '">' + ss + '/100</div></div>';

  // Details
  H += '<div class="dr"><span class="dl">优势方</span><span class="dv">' + fav + ' (赔率 ' + fo.toFixed(2) + ')</span></div>';
  H += '<div class="dr"><span class="dl">赔率区间</span><span class="dv">' + br + '</span></div>';
  H += '<div class="dr"><span class="dl">预计盘口</span><span class="dv" style="color:' + BG[ah] + '">' + ah + '</span></div>';
  if (hi) {
    H += '<div class="dr"><span class="dl">历史同区间(' + hi.t + '场)</span><span class="dv">上盘' + hi.u + ' 走水' + hi.p + ' 赢半' + hi.h + ' 下盘' + hi.d + '</span></div>';
  }
  H += '<div class="dr"><span class="dl">必发比例</span><span class="dv">' + bl + (hi ? ' (均' + hi.bf + '%)' : '') + '</span></div>';
  H += '<div class="dr"><span class="dl">成交量</span><span class="dv">' + vl + (hi ? ' (均' + hi.v.toFixed(1) + 'M)' : '') + '</span></div>';
  if (sg.length > 0) {
    H += '<div class="dr"><span class="dl">信号修正</span><span class="dv">' + sg.join(' | ') + '</span></div>';
  }

  // Warnings
  if (gd === 1 && br === '1.48-1.60' && hi) {
    H += '<div class="wn" style="background:#fef9c3;border:1px solid #ca8a04">⚠️ <b>走水预警：</b>赢1球=走水。历史走水率' + Math.round(hi.p/hi.t*100) + '%</div>';
  }
  if (bf >= 85) {
    H += '<div class="wn" style="background:#fee2e2;border:1px solid #dc2626">🚫 <b>过热风险：</b>必发85%+上盘率仅25%。</div>';
  }
  if (vol > 20) {
    H += '<div class="wn" style="background:#fee2e2;border:1px solid #dc2626">🚫 <b>天量成交：</b>>20M上盘率仅20%。</div>';
  }
  if (hf && br === '1.48-1.60') {
    H += '<div class="wn" style="background:#fee2e2;border:1px solid #dc2626">⚠️ <b>主场陷阱：</b>主场优势方+1.48-1.60上盘率仅20%。</div>';
  }
  if (!hf && br === '1.30-1.47') {
    H += '<div class="wn" style="background:#dcfce7;border:1px solid #16a34a">✅ <b>最佳区间：</b>客场优势方+1.30-1.47上盘率66%。</div>';
  }

  // Strategy
  H += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e2e8f0;font-size:0.82rem;line-height:1.7"><b>🎯 策略建议</b><br>';
  if (ss >= 65) {
    H += '✅ 可投注。';
    if (br === '1.48-1.60') H += '赢1球只走水，需赢2球+。';
    if (!hf) H += '客场优势更稳定。';
  } else if (ss >= 40) {
    H += '⚠️ 谨慎。';
    if (br === '1.48-1.60') H += '一球盘走水风险。';
    if (bf >= 85) H += '市场过热。';
  } else {
    H += '❌ 不建议投注。';
    if (hf && br === '1.48-1.60') H += '主场一球陷阱。';
    if (bf >= 85) H += '过热易爆冷。';
    if (vol > 20) H += '资金过于集中。';
  }
  H += '</div>';

  el.innerHTML = H;
  document.getElementById('rc').style.display = 'block';
  window.scrollTo({top: document.getElementById('rc').offsetTop - 20, behavior:'smooth'});
};
</script>
</body>
</html>
